name: Testes E2E

on:
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: yarn

      - run: npx playwright install --with-deps

      - run: yarn run e2e

      - name: Publicar Relatório
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          