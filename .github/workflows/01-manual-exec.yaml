# CI de Nível 01 - Disparo Manual através de clique

# nome da pipeline
name: 'N1 - Execução Manual'

# gatilhos/ triggers - regras de disparo
# gatilho manual = workflow disptch

on:
  workflow_dispatch:

# tarefas dentro da pipeline = jobs

jobs:
  # nome do job
  e2e-tests:
    # maquina onde o jobs vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      #clone do jrojeto
      - uses: actions/checkout@v4

        # instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
        # instalação do yarn
      - name: Instalando Yarn
        run: npm install -g yarn
        # instalação das dependências
      - name: Instalando dependências
        run: yarn
        # instalação dos Browsers do Playwright
      - name: Instalando Browsers do Playwright
        run: yarn playwright install
        # executando os testes e2e
      - name: Executando testes e2e
        run: yarn run e2e
