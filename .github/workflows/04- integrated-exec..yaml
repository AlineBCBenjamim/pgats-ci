# CI de Nível 04 - Pipeline Integrada ao Build do código

# nome da pipeline
name: 'Execução Integrada'

# gatilhos/ triggers - regras de disparo
# gatilho manual = workflow disptch

on:
  workflow_dispatch:

# tarefas dentro da pipeline = jobs

jobs:
  # nome do job
  inspecao:
    # maquina onde o jobs vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      #clone do jrojeto
      - uses: actions/checkout@v4

        # instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: latest

        # instalação do yarn
      - name: Instalando Yarn
        run: npm install -g yarn
        # instalação das dependências
      - name: Instalando dependências
        run: yarn

      - name: Inspeção de Código
        run: yarn lint

        # teste de unidade

  unidade:
    runs-on: ubuntu-latest
    needs: [inspecao]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Rodando testes unitários
        run: yarn run test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [inspecao]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Instalando Browsers do Playwright
        run: yarn playwright install

      - name: Executando testes E2E
        run: yarn run e2e

  deploy:
    runs-on: ubuntu-latest
    needs: [unidade, e2e-tests]

    # Vai printar na tela do console
    steps:
      - name: Simulação de Deploy
        run: echo 'Deploy sendo realizado...'
